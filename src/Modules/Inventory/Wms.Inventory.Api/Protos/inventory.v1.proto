// Read API internal Inventory
syntax = "proto3";

package inventory.v1;

option csharp_namespace = "Wms.Inventory.Api.Grpc.V1";

// Sync read balance Stock untuk kebutuhan lintas service internal
service InventoryReadService {
  rpc GetStock (GetStockRequest) returns (StockSummary);
}

message GetStockRequest {
  string stock_id = 1;
}

message StockSummary {
  string stock_id = 1;
  string sku = 2;
  string warehouse_id = 3;
  string location_id = 4;
  string batch = 5;
  string status = 6;
  double qty = 7;
  double available_qty = 8;
}
